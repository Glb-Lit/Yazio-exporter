name: Release Windows App

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: |
          pyinstaller --noconfirm --windowed --name YazioDesktopExporter app/main.py --add-data "app/resources;app/resources"

      - name: Archive artifact
        shell: pwsh
        run: |
          Compress-Archive -Path dist/YazioDesktopExporter/* -DestinationPath dist/YazioDesktopExporter-win64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: YazioDesktopExporter-win64
          path: dist/YazioDesktopExporter-win64.zip

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/YazioDesktopExporter-win64.zip
